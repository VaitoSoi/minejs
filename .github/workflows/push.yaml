on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v6

      - name: Setup Corepack (for PNPM)
        run: corepack enable

      - name: Install packages
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm eslint .

      - name: Type check
        run: pnpm tsc --noEmit